services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexarajournals
      POSTGRES_USER: nexarajournals
      POSTGRES_PASSWORD: nexarajournals
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/docker/pgsql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexarajournals -d nexarajournals"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: {}
